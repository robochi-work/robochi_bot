repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        args: [--target-version, "5.1"]

  - repo: local
    hooks:
      - id: pytest
        name: run tests
        entry: bash -c 'cd /home/webuser/robochi_bot && source venv/bin/activate && set -a && source .env && set +a && export DJANGO_SETTINGS_MODULE=config.django.local && pytest tests/ -x --timeout=30'
        language: system
        pass_filenames: false
        stages: [pre-push]
