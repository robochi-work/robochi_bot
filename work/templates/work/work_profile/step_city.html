{% extends 'work/work_profile/steps.html' %}
{% load i18n %}

{% block form %}
<form method="post" class="city-page">
    {% csrf_token %}
    {{ wizard.management_form }}

    <h2 class="city-title">{% trans "Choose your city" %}</h2>

    <div class="city-list">
        {% for radio in form.city %}
            <label class="city-card" for="{{ radio.id_for_label }}">
                {{ radio.tag }}
                <span class="city-card__label">{{ radio.choice_label }}</span>
            </label>
        {% endfor %}

        <a href="https://t.me/robochi_work_admin/" class="city-admin-link">
            {% trans "If your city is not on the list — write to the administrator" %}
        </a>
    </div>

    <div class="city-submit-bar">
        <button type="submit">{% trans "Continue" %}</button>
    </div>
</form>

<style>
    .city-page {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 0;
        margin: 0;
    }
    .city-title {
        text-align: center;
        font-size: 18px;
        font-weight: 700;
        padding: 16px 14px 10px;
        margin: 0;
        text-shadow: 1px 1px 2px rgba(255,255,255,0.7), -1px -1px 2px rgba(0,0,0,0.6);
    }
    .city-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px 14px 20px;
        -webkit-overflow-scrolling: touch;
    }
    .city-card {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        padding: 16px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 16px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        text-shadow: 1px 1px 2px rgba(255,255,255,0.4);
        transition: background 0.2s;
    }
    .city-card input[type="radio"] {
        width: 20px;
        height: 20px;
        margin: 0 12px 0 0;
        flex-shrink: 0;
        accent-color: var(--steel-bottom);
    }
    .city-card:has(input:checked) {
        background: rgba(255,255,255,0.3);
        border-color: var(--accent-dark);
    }
    .city-card__label {
        flex: 1;
    }
    .city-admin-link {
        display: block;
        text-align: center;
        padding: 16px 12px;
        margin-top: 4px;
        color: var(--accent-dark);
        font-size: 13px;
        text-decoration: underline;
        text-shadow: 1px 1px 2px rgba(255,255,255,0.4);
    }
    .city-submit-bar {
        flex-shrink: 0;
        padding: 10px 14px 16px;
        background: transparent;
    }
    .city-submit-bar button[type="submit"] {
        margin: 0 auto;
    }
</style>
{% endblock %}
