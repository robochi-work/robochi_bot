{% extends 'base.html' %}
{% load i18n %}

{% block body %}
<main class="page page--admin-dashboard">
    <div class="admin-header">
        <h2>Панель керування</h2>
        <p>Роль: Адміністратор</p>
    </div>

    <div class="admin-placeholder">
        <p>Функціонал адміністратора в розробці.</p>
        <p>Використовуйте Django адмін-панель для управління системою.</p>
    </div>
</main>

<style>
    .page--admin-dashboard {
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    .admin-header h2 {
        margin: 0;
        font-size: 22px;
        color: var(--text-color, #fff);
    }
    .admin-header p {
        margin: 4px 0 0;
        font-size: 14px;
        opacity: 0.7;
    }
    .admin-placeholder {
        background: var(--card-bg, rgba(255,255,255,0.08));
        border-radius: 12px;
        padding: 24px 16px;
        text-align: center;
    }
    .admin-placeholder p {
        margin: 8px 0;
        font-size: 15px;
    }
</style>
{% endblock %}
